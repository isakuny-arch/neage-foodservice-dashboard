name: Build neage Foodservice Dashboard

on:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Scrape neage foodservice data
        run: |
          mkdir -p data
          python scrape_neage_foodservice.py \
            --start-year 1996 \
            --out data/neage_foodservice_events.json \
            --csv data/neage_foodservice_events.csv \
            --failed data/neage_foodservice_failed.json \
            --delay 0.7 \
            --max-pages 180
          echo "JSON bytes:"
          wc -c data/neage_foodservice_events.json
          echo "CSV lines:"
          wc -l data/neage_foodservice_events.csv || true
          echo "Failed pages:"
          cat data/neage_foodservice_failed.json

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
