<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>neage Foodservice Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root{--bg:#f6f1e7;--panel:#fffaf1;--ink:#211d18;--muted:#70665b;--line:#ddd0bf;--red:#b84d32;--green:#2f6f73;--shadow:0 16px 40px rgba(70,45,20,.11)}
    *{box-sizing:border-box}
    body{margin:0;padding:28px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP",sans-serif;background:linear-gradient(135deg,#faf6ef,#eee2d2);color:var(--ink)}
    h1{font-family:"Yu Mincho","Hiragino Mincho ProN",serif;font-size:clamp(34px,5vw,64px);letter-spacing:-.04em;margin:0 0 8px}
    .lead{color:var(--muted);line-height:1.8;max-width:900px}
    .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:20px 0}
    .card,.panel{background:rgba(255,250,241,.9);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow);padding:16px}
    .card span{font-size:12px;color:var(--muted);font-weight:800}.card strong{display:block;font-size:32px;margin-top:8px}
    .toolbar{display:grid;grid-template-columns:1fr 220px 220px;gap:10px;margin:16px 0}
    input,select{font:inherit;padding:12px 14px;border:1px solid var(--line);border-radius:999px;background:#fff}
    .grid{display:grid;grid-template-columns:1.15fr .85fr;gap:12px}
    .chartBox{height:390px}
    canvas{width:100%!important;height:100%!important}
    table{width:100%;border-collapse:collapse;font-size:13px;background:white}
    th,td{padding:9px 8px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}
    th{position:sticky;top:0;background:#fffaf1;color:var(--muted);z-index:2}
    .tablewrap{max-height:560px;overflow:auto;border:1px solid var(--line);border-radius:14px}
    .pill{display:inline-block;border-radius:999px;padding:4px 8px;background:rgba(47,111,115,.12);color:var(--green);font-weight:800;font-size:11px}
    .bad{color:var(--red);font-weight:800}
    .note{font-size:12px;color:var(--muted);line-height:1.6}
    a{color:#0b65c2}
    @media(max-width:900px){.kpis,.grid,.toolbar{grid-template-columns:1fr}.chartBox{height:300px}table{min-width:960px}}
  </style>
</head>
<body>
  <h1>neage Foodservice Dashboard</h1>
  <p class="lead">値上げ備忘録の外食カテゴリを取得し、1996年を起点に価格指数化します。商品×サイズ×地域価格を別系列として扱い、出典URLも保持します。</p>

  <div class="toolbar">
    <input id="q" placeholder="チェーン・商品・バリアントで検索">
    <select id="chain"><option value="">全チェーン</option></select>
    <select id="variant"><option value="">全バリアント</option></select>
  </div>

  <div class="kpis">
    <div class="card"><span>レコード数</span><strong id="kRecords">-</strong></div>
    <div class="card"><span>系列数</span><strong id="kSeries">-</strong></div>
    <div class="card"><span>チェーン数</span><strong id="kChains">-</strong></div>
    <div class="card"><span>最大指数</span><strong id="kMax">-</strong></div>
  </div>

  <div class="grid">
    <section class="panel">
      <h2>価格指数タイムライン</h2>
      <p class="note">表示対象のうち、最新指数が高い上位20系列を描画します。</p>
      <div class="chartBox"><canvas id="lineChart"></canvas></div>
    </section>
    <section class="panel">
      <h2>上昇率ランキング</h2>
      <div id="ranking" class="tablewrap"></div>
    </section>
  </div>

  <section class="panel" style="margin-top:12px">
    <h2>All Records</h2>
    <p class="note" id="status">読み込み中...</p>
    <div class="tablewrap">
      <table>
        <thead><tr><th>日付</th><th>チェーン</th><th>商品</th><th>区分</th><th>価格</th><th>指数</th><th>出典</th></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </section>

<script>
let raw=[], filtered=[], chart;
const $=id=>document.getElementById(id);
const fmt=n=>Number(n||0).toLocaleString();

async function load(){
  const paths=['data/neage_foodservice_events.json','neage_foodservice_events.json'];
  let lastErr='';
  for(const p of paths){
    try{
      const r=await fetch(p+'?ts='+Date.now());
      if(!r.ok){lastErr=p+' status '+r.status; continue;}
      const j=await r.json();
      raw = Array.isArray(j) ? j : (j.events || []);
      break;
    }catch(e){lastErr=String(e)}
  }
  if(!raw.length){
    $('status').innerHTML='データが0件です。Actionsログで <code>[DONE] records=</code> が0より大きいか確認してください。最後のエラー: '+lastErr;
    return;
  }
  initFilters();
  render();
}
function initFilters(){
  const chains=[...new Set(raw.map(r=>r.chain).filter(Boolean))].sort();
  const variants=[...new Set(raw.map(r=>r.variant).filter(Boolean))].sort();
  $('chain').innerHTML='<option value="">全チェーン</option>'+chains.map(x=>`<option>${esc(x)}</option>`).join('');
  $('variant').innerHTML='<option value="">全バリアント</option>'+variants.map(x=>`<option>${esc(x)}</option>`).join('');
  $('q').oninput=render; $('chain').onchange=render; $('variant').onchange=render;
}
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function applyFilters(){
  const q=$('q').value.toLowerCase().trim(), c=$('chain').value, v=$('variant').value;
  filtered=raw.filter(r=>(!c||r.chain===c)&&(!v||r.variant===v)&&(!q||[r.chain,r.product,r.variant,r.page_title].join(' ').toLowerCase().includes(q)));
}
function latestBySeries(rows){
  const m=new Map();
  rows.forEach(r=>{const id=r.series_id || [r.chain,r.product,r.variant,r.source_url].join('|'); if(!m.has(id)||r.date>m.get(id).date)m.set(id,r)});
  return [...m.values()];
}
function render(){
  applyFilters();
  const latest=latestBySeries(filtered);
  $('status').textContent=`表示中: ${filtered.length.toLocaleString()}件`;
  $('kRecords').textContent=fmt(filtered.length);
  $('kSeries').textContent=fmt(latest.length);
  $('kChains').textContent=fmt(new Set(filtered.map(r=>r.chain)).size);
  const max=latest.reduce((a,b)=>(Number(a?.index||0)>Number(b.index||0)?a:b), null);
  $('kMax').textContent=max?Number(max.index).toFixed(0):'-';
  renderTable(filtered);
  renderRanking(latest);
  renderChart(filtered, latest);
}
function renderTable(rows){
  $('tbody').innerHTML=rows.slice().sort((a,b)=>b.date.localeCompare(a.date)).slice(0,2000).map(r=>`
    <tr>
      <td>${esc(r.date)}${r.is_baseline_1996?'<br><span class="pill">1996基準</span>':''}</td>
      <td>${esc(r.chain)}</td>
      <td>${esc(r.product)}</td>
      <td><span class="pill">${esc(r.variant)}</span></td>
      <td>${fmt(r.price)}円</td>
      <td class="bad">${Number(r.index||0).toFixed(0)}</td>
      <td><a target="_blank" href="${esc(r.source_url)}">source</a></td>
    </tr>`).join('');
}
function renderRanking(latest){
  const rows=latest.slice().sort((a,b)=>Number(b.index||0)-Number(a.index||0)).slice(0,50);
  $('ranking').innerHTML=`<table><thead><tr><th>順位</th><th>系列</th><th>指数</th></tr></thead><tbody>`+
    rows.map((r,i)=>`<tr><td>${i+1}</td><td>${esc(r.chain)} / ${esc(r.product)} / ${esc(r.variant)}<br><span class="note">${esc(r.date)} ${fmt(r.price)}円</span></td><td class="bad">${Number(r.index||0).toFixed(0)}</td></tr>`).join('')+
    `</tbody></table>`;
}
function renderChart(rows, latest){
  const topIds=new Set(latest.slice().sort((a,b)=>Number(b.index||0)-Number(a.index||0)).slice(0,20).map(r=>r.series_id));
  const groups=new Map();
  rows.filter(r=>topIds.has(r.series_id)).forEach(r=>{if(!groups.has(r.series_id))groups.set(r.series_id,[]);groups.get(r.series_id).push(r)});
  const labels=[...new Set([...groups.values()].flat().map(r=>r.date))].sort();
  const colors=['#b84d32','#2f6f73','#b9892e','#405f8c','#7b5aa6','#a34362','#4c7661','#9a6a2e'];
  const datasets=[...groups.values()].map((arr,i)=>{
    arr.sort((a,b)=>a.date.localeCompare(b.date));
    const name=arr[0].chain+' '+arr[0].product+' '+arr[0].variant;
    return {label:name,data:labels.map(d=>{const r=arr.find(x=>x.date===d);return r?Number(r.index):null}),spanGaps:true,borderWidth:2,pointRadius:2,borderColor:colors[i%colors.length]};
  });
  if(chart) chart.destroy();
  chart=new Chart($('lineChart'),{type:'line',data:{labels,datasets},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'nearest',intersect:false},plugins:{legend:{position:'bottom'}},scales:{y:{title:{display:true,text:'指数'}},x:{ticks:{maxTicksLimit:8}}}}});
}
load();
</script>
</body>
</html>
